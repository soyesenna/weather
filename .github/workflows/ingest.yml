name: ingest
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel ingest endpoint
        run: |
          set -euo pipefail
          : "${DEPLOY_URL:?DEPLOY_URL secret is required}"
          : "${INGEST_TOKEN:?INGEST_TOKEN secret is required}"

          DEPLOY_URL="${DEPLOY_URL%/}"
          if [[ "$DEPLOY_URL" != https://* ]]; then
            echo "DEPLOY_URL must start with https://" >&2
            exit 2
          fi

          body="$(mktemp)"
          trap 'rm -f "$body"' EXIT
          curl -fsSL --post301 --post302 --post303 \
            -X POST "$DEPLOY_URL/api/ingest/all" \
            -H "X-Ingest-Token: $INGEST_TOKEN" \
            -H "Accept: application/json" \
            -o "$body"

          python3 - "$body" <<'PY'
          import json
          import sys

          path = sys.argv[1]
          try:
              data = json.load(open(path))
          except Exception as exc:
              print(open(path).read(), file=sys.stderr)
              raise SystemExit(f"ingest response is not JSON: {exc}")

          if data.get("ok") is not True:
              raise SystemExit(f"ingest failed: {data}")

          stored = data.get("stored") or {}
          if stored.get("fallback") is True:
              raise SystemExit("ingest ran but did not persist to DB. Check Vercel DATABASE_URL/DIRECT_URL and schema.")
          if int(stored.get("stored") or 0) <= 0:
              raise SystemExit(f"ingest stored zero risk cells: {data}")

          print("ingest ok", {
              "fetchedAt": data.get("fetchedAt"),
              "cells": data.get("cells"),
              "stored": stored.get("stored"),
              "snapshots": (data.get("snapshots") or {}).get("stored"),
          })
          PY
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
